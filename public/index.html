<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background-color: #0b0e1f;
      margin: 0;
      min-height: 100vh;
    }

    * {
      font-family: Verdana, sans-serif;
      letter-spacing: 1px;
      color: #EEE
    }

    .doc {
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
      color: #AAA;
    }

    .title {
      margin: 0;
      font-weight: 500;
      letter-spacing: 2px;
    }

    .horizontal-line {
      border-bottom: 1px solid #888;
      padding: 4px 0;
    }

    .text {
      padding: 16px 0 0 0;
    }

    li {
      padding-bottom: 4px;
    }

    a {
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      color: #BBB;
    }

    .go-down {
      flex-grow: 1;
    }

    footer {
      color: #888
    }
  </style>
  <title>
    Charlie Webb

  <meta name="description" content="Landing page for Charlie Webb's online presence">
</head>
